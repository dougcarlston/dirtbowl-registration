<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DirtBowl Registration</title>
<style>
*,*::before,*::after{box-sizing:border-box;}
body,div,dl,dt,dd,ul,ol,li,h1,h2,h3,h4,h5,h6,pre,form,fieldset,input,textarea,p,blockquote,th,td{margin:0;padding:0;}
table{border-collapse:collapse;border-spacing:0;}
h1,h2,h3,h4,h5,h6{font-size:100%;font-weight:normal;}
body{font-family:Georgia,serif;font-size:13px;background:#365373;color:#3c3c3c;margin:16px 32px;line-height:1.4;}
#outerContainer{text-align:center;width:100%;}
#tawalaProjectContainer{background:#f5f4ed;margin:0 auto;display:inline-block;min-width:700px;max-width:950px;text-align:left;}
h1.pageHeading{background:#f5f4ed;color:#7b4500;font-size:26px;font-weight:bold;padding:22px 28px;min-height:76px;display:flex;align-items:center;}
form{padding:1.2em 2.5em 2em;}
div.text,h2.text,h3.text{padding-bottom:1em;}
h2.text.heading{font-size:20px;font-weight:bold;color:#7B4500;border-bottom:2px solid #7B4500;padding-bottom:.3em;margin:.5em 0 .7em;}
h3.text.subheading{font-size:14px;font-weight:bold;color:#7B4500;margin:.4em 0 .6em;}
div.text.normal{font-size:13px;}
div.text.instructional{color:#3a4ea0;font-style:italic;background:#eef0ff;border-left:5px solid #7b8fe0;padding:.6em 1em;margin:.6em 0 1em;border-radius:3px;}
div.textItem{padding-bottom:1.2em;}
table.fib{border-collapse:collapse;margin-bottom:.3em;}
table.fib tr td{padding-bottom:.35em;padding-right:.6em;vertical-align:middle;}
table.fib tr td.label{width:165px;padding-right:1em;font-size:13px;text-align:left;}
input.text,textarea{font-family:inherit;font-size:100%;border:1px solid #7B4500;padding:.25em .4em;border-radius:2px;background:#fffff8;}
input.text.small{width:6em;}input.text.medium{width:18em;}input.text.large{width:38em;}
div.mcRadio,div.mcCheckbox{padding-bottom:1.2em;}
div.mcRadio label.question,div.mcCheckbox label.question{display:block;font-weight:bold;padding-bottom:.4em;padding-top:.3em;}
div.mcRadio span.answer,div.mcCheckbox span.answer{display:block;padding-bottom:.4em;}
div.mcRadio span.answer input,div.mcCheckbox span.answer input{margin-right:.4em;vertical-align:middle;cursor:pointer;accent-color:#7B4500;}
div.mcRadio span.answer label,div.mcCheckbox span.answer label{vertical-align:middle;cursor:pointer;}
#errormsg{border:1px solid #c00;padding:8px 12px;width:85%;color:#880000;text-align:center;margin:0 auto 12px;font-weight:bold;border-radius:3px;background:#fff8f8;display:none;}
#errormsg.show{display:block;}
.submitRow{margin-top:1.5em;padding-top:1em;border-top:1px solid #ccc;text-align:right;}
button.submit{background:#7B4500;color:#fff;border:none;padding:.5em 2em;font-size:14px;font-family:inherit;border-radius:4px;cursor:pointer;font-weight:bold;}
button.submit:hover{opacity:.85;}button.submit:disabled{opacity:.5;cursor:not-allowed;}
div.document{padding:1em 2em;line-height:1.6;}
div.document p{margin-bottom:.8em;}
div.document table{width:100%;border-collapse:collapse;margin-bottom:1em;}
div.document table th{background:#7B4500;color:#fff;padding:.4em .8em;text-align:left;}
div.document table td{padding:.35em .8em;border-bottom:1px solid #ddd;}
/* Tawala document renderer styles */
div.tawala-doc{padding:1.2em 2em;line-height:1.6;}
div.tawala-doc p{margin-bottom:.6em;}
table.doc-table{border-collapse:collapse;margin-bottom:.8em;}
table.doc-table td{vertical-align:top;padding:.3em .6em;}
a.tawala-inv{color:#7B4500;font-weight:bold;text-decoration:underline;cursor:pointer;}
a.tawala-inv:hover{color:#b56000;background:#fff8ee;border-radius:2px;}
span.record-count{font-weight:bold;color:#7B4500;}
#innerTawalaFooter{background:#7B4500;height:36px;width:100%;margin-top:2em;display:flex;align-items:center;justify-content:flex-end;padding-right:16px;}
#innerTawalaFooter span{color:#fff;font-size:11px;opacity:.8;}
#loadingOverlay{display:flex;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:999;align-items:center;justify-content:center;}
.spinner{width:44px;height:44px;border:5px solid #fff;border-top-color:#7B4500;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---- Registration review summary (T9) ---- */
.review-table { width:100%; border-collapse:collapse; margin:.5em 0 1em; font-size:.92em; }
.rv-section   { background:#e8f0e8; color:#2a4a2a; font-weight:bold; padding:.4em .6em;
                text-align:left; border-top:2px solid #5a8a5a; }
.rv-label     { width:38%; padding:.35em .6em; color:#444; vertical-align:top;
                border-bottom:1px solid #ddd; }
.rv-val       { padding:.35em .6em; font-weight:500; border-bottom:1px solid #ddd; }
</style>
</head><body>
<div id="outerContainer"><div id="tawalaProjectContainer">
  <h1 class="pageHeading" id="pageTitle">DirtBowl</h1>
  <div id="errormsg"></div>
  <div id="appContent"></div>
  <div id="innerTawalaFooter"><span>Powered by Tawala</span></div>
</div></div>
<div id="loadingOverlay"><div class="spinner"></div></div>
<script>
var RUNTIME = "https://superagent-3398ca67.base44.app/functions/tawalaRuntime";
var projectId = "6a34733123a041ce92083424";
var linkId = "lnk-" + Math.random().toString(36).slice(2, 10);

function escH(s) { return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function bsz(l) { return l <= 8 ? "small" : l <= 24 ? "medium" : "large"; }
function parseFibPrompt(prompt, blanks) {
  // Split prompt on / or // into row segments (respecting [] and () brackets)
  var segs = [], cur = "", i = 0, s = prompt || "";
  while (i < s.length) {
    if (s[i] === "[") { var j = s.indexOf("]", i+1); cur += s.slice(i, j+1); i = j+1; }
    else if (s[i] === "(") { var j = s.indexOf(")", i+1); cur += s.slice(i, j+1); i = j+1; }
    else if (s[i] === "/") { segs.push(cur); cur = ""; i += (s[i+1]==="/" ? 2 : 1); }
    else { cur += s[i++]; }
  }
  segs.push(cur);
  segs = segs.map(function(x){return x.trim();}).filter(Boolean);

  // Count how many blanks each segment claims
  var segWants = segs.map(function(seg) {
    var cols = (seg.match(/\[[^\]]*\]/g) || []);
    return cols.length > 0 ? cols.length : 1;
  });
  // Give leftover blanks to the last segment
  var totalWanted = segWants.reduce(function(a,b){return a+b;}, 0);
  var extra = blanks.length - totalWanted;
  if (extra > 0) segWants[segWants.length-1] += extra;

  // Build rows
  var rows = [], bi = 0;
  for (var si = 0; si < segs.length; si++) {
    var seg = segs[si], n = segWants[si];
    var cols = (seg.match(/\[[^\]]*\]/g) || []).map(function(c){return c.slice(1,-1);});
    var noColSeg = seg.replace(/\[[^\]]*\]/g, "");
    // A parenthetical AFTER the last colon is a post-blank hint (renders right of input).
    // A parenthetical BEFORE the last colon is part of the label (stays in label column).
    var lastColonIdx = noColSeg.lastIndexOf(":");
    var parenIdx = noColSeg.indexOf("(");
    var hint = "";
    var rowLabelRaw;
    if (parenIdx >= 0 && (lastColonIdx < 0 || parenIdx > lastColonIdx)) {
      // Paren is after the last colon — it's a hint
      var hintM = noColSeg.match(/\(([^)]*)\)/);
      hint = hintM ? hintM[1] : "";
      rowLabelRaw = noColSeg.replace(/\([^)]*\)/g, "").trim().replace(/:$/, "").trim();
    } else {
      // Paren is before the last colon (or no paren) — keep it in the label
      rowLabelRaw = noColSeg.trim().replace(/:$/, "").trim();
    }
    // If there are inner colons (e.g. "Preferences:Coach Preference"), use only the last segment
    var rowLabelParts = rowLabelRaw.split(":");
    var rowLabel = rowLabelParts[rowLabelParts.length - 1].trim();
    var blankDefs = [];
    for (var k = 0; k < n && bi < blanks.length; k++, bi++) {
      blankDefs.push({ name: blanks[bi].name, colLabel: cols[k] || "", length: blanks[bi].length || 20 });
    }
    rows.push({ rowLabel: rowLabel, hint: hint, blankDefs: blankDefs });
  }
  return rows;
}
function showOverlay() { document.getElementById("loadingOverlay").style.display = "flex"; }
function hideOverlay() { document.getElementById("loadingOverlay").style.display = "none"; }
function showErr(msg) { var e = document.getElementById("errormsg"); e.innerHTML = msg; e.classList.toggle("show", !!msg); }

function renderFib(item, vals, pfx) {
  var style = item.style || "";
  var blanks = item.blanks || [];
  var prompt = item.prompt || "";

  // Decide layout mode:
  // Use table (aligned) mode when:
  //   - style explicitly says leftAlign/rightAlign, OR
  //   - prompt has row-separating structure (/ or [col] labels) regardless of style
  var promptHasStructure = prompt.indexOf("/") >= 0 || prompt.indexOf("[") >= 0 || prompt.indexOf(":") >= 0;
  var useTable = style.indexOf("Align") >= 0 || (promptHasStructure && style !== "topLabels");
  var align = style.indexOf("right") >= 0 ? "right" : "left";

  if (useTable) {
    var rows = parseFibPrompt(prompt, blanks);
    return '<table class="fib"><tbody>' + rows.map(function(row) {
      var blanksHtml = row.blankDefs.map(function(bd) {
        var val = vals[pfx + bd.name] || vals[bd.name] || "";
        var colLbl = bd.colLabel ? '<div style="font-size:.8em;color:#555;text-align:center">' + escH(bd.colLabel) + "</div>" : "";
        return '<span style="display:inline-block;margin-right:.4em;vertical-align:top">' + colLbl + '<input class="text ' + bsz(bd.length) + '" type="text" name="' + escH(pfx + bd.name) + '" value="' + escH(val) + '"></span>';
      }).join("");
      var hintHtml = row.hint ? '&nbsp;<span style="font-size:.85em;color:#666">(' + escH(row.hint) + ')</span>' : "";
      return '<tr><td class="label ' + align + '">' + escH(row.rowLabel) + '</td><td>' + blanksHtml + hintHtml + '</td></tr>';
    }).join("") + "</tbody></table>";
  }

  // Inline mode (topLabels / no prompt structure): blanks flow horizontally
  // with optional small col-label above each
  return '<div class="fib">' + blanks.map(function(b) {
    var lbl = b.colLabel ? '<div style="font-size:.8em;color:#555;text-align:center">' + escH(b.colLabel) + "</div>" : "";
    var val = vals[pfx + b.name] || vals[b.name] || "";
    return '<span style="display:inline-block;margin-right:.5em;vertical-align:top">' + lbl + '<input class="text ' + bsz(b.length || 20) + '" type="text" name="' + escH(pfx + b.name) + '" value="' + escH(val) + '"></span>';
  }).join("") + "</div>";
}

function renderMcQuestion(question) {
  // Detect "click here" pattern and render as a no-op link for now
  // Format: "...text (To learn more about X, click here)"
  if (!question) return "";
  var linked = question.replace(/\(([^)]*?),?\s*click here\)/gi, function(match, before) {
    return '(<span class="clickHereNote">' + escH(before.trim()) + ', <a href="#" onclick="alert(\'Division descriptions are not yet configured for this league.\'); return false;">click here</a></span>)';
  });
  // If we made a substitution it contains HTML so return as-is; otherwise escape
  if (linked !== question) return '<label class="question">' + linked + "</label>";
  return '<label class="question">' + escH(question) + "</label>";
}

function renderMc(item, vals, pfx) {
  var nm = item.name || item.label, key = pfx + nm;
  var cur = (vals[key] || vals[nm] || "").split(",").map(function(s) { return s.trim(); });
  var itype = (item.displayAs === "checkbox" || !item.onlyone) ? "checkbox" : "radio";
  var dcls = itype === "radio" ? "mcRadio" : "mcCheckbox";
  var q = item.question ? renderMcQuestion(item.question) : "";

  // Resolve choices: static array or a single dynamic entry
  var choices = item.choices || [];
  var hasDynamic = choices.some(function(c) { return c.type === "dynamic"; });
  var resolvedChoices;

  if (hasDynamic) {
    // Dynamic choices: look up pre-loaded _dynamicChoices on the item
    resolvedChoices = item._dynamicChoices || [];
    if (resolvedChoices.length === 0) {
      // Not yet loaded — render a placeholder that JS will fill in
      return '<div class="' + dcls + ' dynamicMc" data-item-label="' + escH(item.label) + '">'
           + q
           + '<span class="dynamicChoicesLoading">Loading options…</span>'
           + '</div>';
    }
  } else {
    resolvedChoices = choices;
  }

  var ans = resolvedChoices.map(function(c) {
    var chk = cur.indexOf(String(c.label)) >= 0 ? " checked" : "";
    return '<span class="answer"><input type="' + itype + '" name="' + escH(key) + '" value="' + escH(c.label) + '"' + chk + '><label>' + escH(c.text) + "</label></span>";
  }).join("");
  return '<div class="' + dcls + '">' + q + ans + "</div>";
}

function renderItem(item, vals, fname) {
  var pfx = fname + ":", content = item.content || "", style = item.style || "normal";
  if (item.type === "field") return "";
  if (content === "[skipInstructions]") return "__SKIP__";
  if (item.type === "fib") return '<div class="textItem">' + renderFib(item, vals, pfx) + "</div>";
  if (item.type === "mc") return '<div class="textItem">' + renderMc(item, vals, pfx) + "</div>";
  if (item.label === "T9") return '<div class="t9-summary-placeholder"></div>';
  if (item.label === "T9") return '<div class="t9-summary-placeholder"></div>';
  if (!content) return "";
  if (item.type === "heading" || item.type === "headingitem") return '<h2 class="text heading">' + escH(content) + "</h2>";
  if (item.type === "subheading" || item.type === "subheadingitem") return '<h3 class="text subheading">' + escH(content) + "</h3>";
  return '<div class="text ' + escH(style) + '">' + escH(content) + "</div>";
}

function buildFormHtml(form, vals) {
  // Pass 1: split items into page-segments at instructional-style text items,
  // and skip-segments at skipInstructions items.
  // An "instructional" text item acts as a page-break: everything before it is
  // Page 1; everything after is hidden until after submission.
  var pages = [{ items: [], instructionalLabel: null }]; // [{items:[], instructionalLabel}]
  (form.items || []).forEach(function(item) {
    if (item.type === "text" && (item.style === "instructional") && item.content) {
      // This item IS the page-break notice — display it, then start a new hidden page
      pages[pages.length - 1].items.push(item);
      pages[pages.length - 1].instructionalLabel = item.label;
      pages.push({ items: [], instructionalLabel: null });
    } else if (item.label === "skip3") {
      pages.push({ items: [], instructionalLabel: null });
    } else {
      pages[pages.length - 1].items.push(item);
    }
  });

  var html = '<input type="hidden" id="hPid" value="' + escH(projectId) + '">'
           + '<input type="hidden" id="hLid" value="' + escH(linkId) + '">'
           + '<input type="hidden" id="hFname" value="' + escH(form.name) + '">';

  pages.forEach(function(page, pageIdx) {
    // Within each page, further split on skipInstructions
    var sections = [[]];
    page.items.forEach(function(item) {
      var r = renderItem(item, vals, form.name);
      if (r === "__SKIP__") sections.push([]); else sections[sections.length - 1].push(r);
    });
    var firstIdx = sections.findIndex(function(s) { return s.some(function(r) { return r.trim(); }); });

    var pageInner = "";
    for (var i = 0; i < sections.length; i++) {
      var inner = sections[i].join("");
      if (!inner.trim()) continue;
      pageInner += i === firstIdx ? inner : '<div class="skipSection" style="display:none">' + inner + "</div>";
    }
    if (!pageInner.trim()) return;

    if (pageIdx === 0) {
      // Page 1: wrap in a named div so it can be hidden when Page 2 is revealed
      if (pages.length > 1) {
        html += '<div id="formPage0">' + pageInner + '<div class="submitRow"><button id="submitBtn" class="submit" type="button">Submit &#x2192;</button></div></div>';
      } else {
        html += pageInner + '<div class="submitRow"><button id="submitBtn" class="submit" type="button">Submit &#x2192;</button></div>';
      }
    } else {
      // Subsequent pages: hidden until after submission
      // Add a Submit button to all non-final pages
      var isLastPage = (pageIdx === pages.length - 1);
      var pageContent = pageInner;
      if (!isLastPage) {
        pageContent += '<div class="submitRow"><button id="submitBtn" class="submit" type="button">Submit &#x2192;</button></div>';
      }
      html += '<div id="formPage' + pageIdx + '" class="formPageBreak" style="display:none">' + pageContent + '</div>';
    }
  });

  return html;
}

function wireBtn() {
  var b = document.getElementById("submitBtn");
  if (b) { b.onclick = function() { doSubmit(); return false; }; }
}

// Fetch dynamic choices for a single item; resolves immediately with [] on any error
function fetchDynamicChoices(item) {
  var dynChoice = item.choices.find(function(c) { return c.type === "dynamic"; });
  if (!dynChoice) return Promise.resolve([]);
  return fetch(RUNTIME, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "getDynamicChoices",
      projectId: projectId,
      linkId: linkId,
      sourceForm: dynChoice.sourceForm,
      displayExpr: dynChoice.displayExpr,
      valueExpr: dynChoice.valueExpr
    })
  }).then(function(r) { return r.json(); })
    .then(function(data) { return data.choices || []; })
    .catch(function() { return []; });
}

function showForm(form, vals) {
  vals = vals || {};

  // Find items with dynamic choices
  var dynamicItems = (form.items || []).filter(function(item) {
    return item.type === "mc" && (item.choices || []).some(function(c) { return c.type === "dynamic"; });
  });

  // Render immediately (shows "Loading options..." placeholders for dynamic items)
  document.getElementById("appContent").innerHTML =
    '<form id="tawalaForm" autocomplete="on">' + buildFormHtml(form, vals) + "</form>";
  var t = document.getElementById("pageTitle");
  if (t) t.textContent = "DirtBowl";
  wireBtn();
  window.scrollTo(0, 0);

  // Then fetch choices and patch each dynamic item in-place
  if (dynamicItems.length === 0) return;
  dynamicItems.forEach(function(item) {
    fetchDynamicChoices(item).then(function(choices) {
      item._dynamicChoices = choices;
      // Find the placeholder div for this item and replace it
      var container = document.querySelector(".dynamicMc[data-item-label='" + item.label + "']");
      if (!container) return; // already resolved or not visible
      // Re-render just this mc item now that choices are loaded
      var tmp = document.createElement("div");
      tmp.innerHTML = renderMc(item, vals, "Registration:");
      container.parentNode.replaceChild(tmp.firstChild, container);
    });
  });
}

function showDoc(html) {
  document.getElementById("appContent").innerHTML = html || "";
  window.scrollTo(0, 0);
  // Wire up invitation nav links rendered inside documents
  var links = document.getElementById("appContent").querySelectorAll("a.tawala-inv");
  for (var i = 0; i < links.length; i++) {
    (function(link) {
      link.addEventListener("click", function(e) {
        e.preventDefault();
        var targetForm = link.getAttribute("data-form");
        if (!targetForm) return;
        showOverlay();
        fetch(RUNTIME, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "submitForm", projectId: projectId, linkId: linkId, formName: targetForm, fields: {} })
        }).then(function(r) { return r.json(); }).then(function(data) {
          hideOverlay();
          if (data.action === "showForm") { showForm(data.form, data.currentValues || {}); }
          else if (data.action === "showDocument") { showDoc(data.html); }
          else if (data.action === "redirect") { window.location.href = data.url; }
          else if (data.error) { showErr(data.error); }
        }).catch(function(err) {
          hideOverlay();
          showErr("Navigation error: " + err.message);
        });
      });
    })(links[i]);
  }
}


function buildReviewSummary(fields) {
  function v(k) { return fields[k] || ""; }
  function row(label, val) {
    if (!val || !String(val).trim()) return "";
    return '<tr><td class="rv-label">' + escH(label) + '</td><td class="rv-val">' + escH(val) + '</td></tr>';
  }
  var dob = [v("RegAgeMo"), v("RegAgeDay"), v("RegAgeYr")].filter(Boolean).join("/");
  var parentName = [v("ParentFirstName"), v("ParentLastName")].filter(Boolean).join(" ");
  var playerName = [v("FirstName"), v("LastName")].filter(Boolean).join(" ");
  var addr = [v("Address"), v("City"), v("Zip")].filter(Boolean).join(", ");
  var phones = [v("Phone1"), v("Phone2"), v("Phone3")].filter(Boolean).join(" / ");
  var emails = [v("ParentEmail"), v("ParentEmail2")].filter(Boolean).join(", ");
  var friends = [v("a"), v("b"), v("c")].filter(Boolean).join(", ");
  var medPlan = [v("MedPlanName"), v("MedPlanNumber")].filter(Boolean).join(" — ");
  var doctor = [v("DocName"), v("DocPhone")].filter(Boolean).join(", ");
  var coachVol = v("ParentWillingToCoach") || "";
  var umpireVol = v("WillingToUmpire") || "";
  var html = '<table class="review-table"><tbody>';
  html += '<tr><th colspan="2" class="rv-section">Player</th></tr>';
  html += row("Name", playerName);
  html += row("Date of Birth", dob);
  html += row("Gender", v("SexMCQ"));
  html += row("School", v("a"));
  html += row("Division requested", v("DivRequest"));
  html += row("Division last year", v("LastDiv"));
  html += '<tr><th colspan="2" class="rv-section">Parent / Guardian</th></tr>';
  html += row("Name", parentName);
  html += row("Address", addr);
  html += row("Email", emails);
  html += row("Phone", phones);
  html += '<tr><th colspan="2" class="rv-section">Preferences</th></tr>';
  html += row("Coach preference", v("PreferredCoach"));
  html += row("Friends on team", friends);
  html += row("T-shirt size", v("ShirtSize"));
  html += row("Parent willing to coach", coachVol);
  html += row("Player willing to umpire", umpireVol);
  html += '<tr><th colspan="2" class="rv-section">Medical</th></tr>';
  html += row("Insurance plan", medPlan);
  html += row("Physician", doctor);
  html += row("Physician address", v("DocAddress"));
  html += '</tbody></table>';
  return html;
}

function doSubmit() {
  var btn = document.getElementById("submitBtn");
  if (btn) btn.disabled = true;
  showErr(""); showOverlay();
  var pid = (document.getElementById("hPid") || {}).value || projectId;
  var lid = (document.getElementById("hLid") || {}).value || linkId;
  var fname = (document.getElementById("hFname") || {}).value || "";
  var fields = {};
  var formEl = document.getElementById("tawalaForm");
  if (formEl) {
    // Collect from ALL pages (including hidden ones) so summary has full data
    var inputs = formEl.querySelectorAll("input,textarea,select");
    var cbSeen = {};
    for (var i = 0; i < inputs.length; i++) {
      var el = inputs[i], n = el.name;
      if (!n) continue;
      if (el.type === "checkbox") {
        if (!cbSeen[n]) { fields[n] = ""; cbSeen[n] = true; }
        if (el.checked) fields[n] = fields[n] ? fields[n] + "," + el.value : el.value;
      } else if (el.type === "radio") {
        if (el.checked) fields[n] = el.value;
      } else {
        fields[n] = el.value;
      }
    }
  }
  // Also merge any server-saved values from Page 1 (stored in window._savedFields)
  if (window._savedFields) {
    Object.keys(window._savedFields).forEach(function(k) {
      if (!fields[k]) fields[k] = window._savedFields[k];
    });
  }
  // Check if there are hidden subsequent pages on this form (only if not yet revealed)
  // Find the next unrevealed page after any currently-revealed page
  var nextPage = null;
  for (var pi = 1; pi <= 10; pi++) {
    var pg = document.getElementById("formPage" + pi);
    if (pg && !pg.getAttribute("data-revealed")) { nextPage = pg; break; }
  }
  if (nextPage && !nextPage.getAttribute("data-revealed")) {
    // Page 1 of a multi-page form: save data server-side, then reveal Page 2
    fetch(RUNTIME, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "submitForm", projectId: pid, linkId: lid, formName: fname, fields: fields })
    }).then(function(r) { return r.json(); }).then(function(data) {
      hideOverlay();
      if (data.action === "validationError") { showErr((data.errors || []).join("<br>")); if (btn) btn.disabled = false; return; }
      if (data.error) { showErr(data.error); if (btn) btn.disabled = false; return; }
      // Data saved — stash Page 1 fields for the review summary
      window._savedFields = Object.assign({}, fields);
      // Data saved — hide all of Page 1, reveal Page 2
      var page0 = document.getElementById("formPage0");
      if (page0) page0.style.display = "none";
      nextPage.style.display = "";
      nextPage.setAttribute("data-revealed", "true");
      // Populate T9 review summary if this page contains it
      (function() {
        var summaryEl = nextPage.querySelector(".t9-summary-placeholder");
        if (summaryEl) { summaryEl.innerHTML = buildReviewSummary(fields); }
      })();
      // Update hidden fname to the same form (page 2 is still the same form submission)
      // Re-wire the submit button inside page 2
      var newBtn = nextPage.querySelector("#submitBtn") || nextPage.querySelector("button.submit");
      if (!newBtn) {
        // Append a new submit row inside page 2
        var row = document.createElement("div");
        row.className = "submitRow";
        row.innerHTML = '<button id="submitBtn" class="submit" type="button">Submit &#x2192;</button>';
        nextPage.appendChild(row);
        newBtn = row.querySelector("button");
      }
      newBtn.disabled = false;
      newBtn.onclick = function() { doSubmit(); return false; };
      window.scrollTo(0, 0);
    }).catch(function(err) {
      hideOverlay();
      showErr("Network error: " + err.message);
      if (btn) btn.disabled = false;
    });
  } else {
    fetch(RUNTIME, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "submitForm", projectId: pid, linkId: lid, formName: fname, fields: fields })
    }).then(function(r) { return r.json(); }).then(function(data) {
      hideOverlay();
      if (data.action === "showForm") { showForm(data.form, data.currentValues || {}); return; }
      if (data.action === "showDocument") { showDoc(data.html); return; }
      if (data.action === "redirect") { window.location.href = data.url; return; }
      if (data.action === "validationError") { showErr((data.errors || []).join("<br>")); if (btn) btn.disabled = false; return; }
      if (data.error) { showErr(data.error); if (btn) btn.disabled = false; return; }
      showErr("Unexpected: " + JSON.stringify(data).slice(0, 200));
      if (btn) btn.disabled = false;
    }).catch(function(err) {
      hideOverlay();
      showErr("Network error: " + err.message);
      if (btn) btn.disabled = false;
    });
  }
}

// Boot: load the first form
function fetchWithTimeout(url, opts, ms) {
  var ctrl = typeof AbortController !== "undefined" ? new AbortController() : null;
  var timer = ctrl ? setTimeout(function() { ctrl.abort(); }, ms) : null;
  if (ctrl) opts.signal = ctrl.signal;
  return fetch(url, opts).finally(function() { if (timer) clearTimeout(timer); });
}

showOverlay();
fetchWithTimeout(RUNTIME, {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ action: "submitForm", projectId: projectId, linkId: linkId, formName: "", fields: {} })
}, 15000).then(function(r) { return r.json(); }).then(function(data) {
  hideOverlay();
  if (data.action === "showForm") { showForm(data.form, data.currentValues || {}); }
  else if (data.action === "showDocument") { showDoc(data.html); }
  else { document.getElementById("appContent").innerHTML = '<div style="padding:1em">Error: ' + escH(JSON.stringify(data)) + "</div>"; }
}).catch(function(err) {
  hideOverlay();
  document.getElementById("appContent").innerHTML = '<div style="padding:1em;color:red">Failed to connect to registration server: ' + escH(err.message) + '<br><br><button onclick="location.reload()">Retry</button></div>';
});
</script>
